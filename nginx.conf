# Nginx config for pixora.aification.ai
# Place at: /etc/nginx/sites-available/pixora
# Then: sudo ln -s /etc/nginx/sites-available/pixora /etc/nginx/sites-enabled/
# Get SSL cert: sudo certbot --nginx -d pixora.aification.ai

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pixora.aification.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pixora.aification.ai;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pixora.aification.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixora.aification.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload size (matches multer 10 MB limit + JSON 2 MB limit)
    client_max_body_size 12M;

    # Proxy all traffic to the Node.js server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
